<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI 摄影教练 | Gemini 3 Pro</title>
    <script>
      (() => {
        const THEMES = new Set(['light', 'dark', 'nature', 'stellar']);
        const STORAGE_KEY = 'muxing-theme';
        const html = document.documentElement;

        const normalize = (value) => {
          if (!value || value === 'light') return '';
          return THEMES.has(value) ? value : '';
        };

        const persist = () => {
          const activeTheme = html.getAttribute('data-theme') || 'light';
          localStorage.setItem(STORAGE_KEY, activeTheme);
        };

        const apply = (value) => {
          const normalized = normalize(value);
          if (normalized) html.setAttribute('data-theme', normalized);
          else html.removeAttribute('data-theme');
          persist();
        };

        const params = new URLSearchParams(window.location.search);
        const queryTheme = params.get('muxing-theme') || params.get('theme');
        const storedTheme = localStorage.getItem(STORAGE_KEY);
        apply(THEMES.has(queryTheme) ? queryTheme : storedTheme);

        new MutationObserver(persist).observe(html, {
          attributes: true,
          attributeFilter: ['data-theme'],
        });

        window.addEventListener('message', (event) => {
          const data = event.data;
          if (!data || data.source !== 'muxing-workbench' || data.type !== 'muxing:set-theme') return;
          apply(data.theme);
        });
      })();
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
            colors: {
              brand: {
                50: 'rgb(var(--brand-50) / <alpha-value>)',
                100: 'rgb(var(--brand-100) / <alpha-value>)',
                200: 'rgb(var(--brand-200) / <alpha-value>)',
                300: 'rgb(var(--brand-300) / <alpha-value>)',
                400: 'rgb(var(--brand-400) / <alpha-value>)',
                500: 'rgb(var(--brand-500) / <alpha-value>)',
                600: 'rgb(var(--brand-600) / <alpha-value>)',
                700: 'rgb(var(--brand-700) / <alpha-value>)',
                800: 'rgb(var(--brand-800) / <alpha-value>)',
                900: 'rgb(var(--brand-900) / <alpha-value>)',
              }
            },
            animation: {
              'fadeIn': 'fadeIn 0.5s ease-out forwards',
              'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'bounce-slow': 'bounce 3s infinite',
            },
            keyframes: {
              fadeIn: {
                '0%': { opacity: '0', transform: 'translateY(10px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              }
            }
          },
        },
      }
    </script>
    <style>
      body {
        background-color: rgb(var(--surface-900));
        color: rgb(var(--surface-200));
      }
      /* Custom scrollbar for webkit */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: rgb(var(--surface-900)); 
      }
      ::-webkit-scrollbar-thumb {
        background: rgb(var(--surface-700)); 
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgb(var(--surface-600)); 
      }
    </style>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
